{% extends 'base.html' %}
{% block content %}

<h2 class="text-center">📢 Notices</h2>

{% for notice in notices %}
<div class="card mb-3">
    <div class="card-body">
        <h5>{{ notice.title }}</h5>
        <p>{{ notice.description }}</p>
        <small>{{ notice.date }}</small>
    </div>
</div>
{% endfor %}

{% endblock %}
