{% extends 'base.html' %}
{% block title %}Teacher Messages{% endblock %}

{% block content %}

<h2 class="text-center mb-5">👩‍🏫 Messages from Teachers</h2>

<div class="row">
    {% for msg in messages %}
    <div class="col-md-4 mb-4">
        <div class="card shadow h-100 text-center p-3">

            {% if msg.image %}
            <img src="{{ msg.image.url }}" class="rounded-circle mx-auto" style="width:120px; height:120px; object-fit:cover;">
            {% endif %}

            <h5 class="mt-3">{{ msg.teacher_name }}</h5>
            <span class="badge bg-primary">{{ msg.post }}</span>

            <p>"{{ msg.message }}"</p>

        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
